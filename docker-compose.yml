version: '3'

services:
  app:
    build: ./app
    ports:
      - "5000:5000"
    depends_on:
      - metadata
      - storage
    env_file:
      - .env

  metadata:
    build: ./metadata
    container_name: metadata
    env_file:
      - .env

  storage:
    build: ./storage
    container_name: storage
    env_file:
      - .env
